name: Vercel Preview Deployment
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  OPTIMIZELY_GRAPH_SINGLE_KEY: ${{ secrets.OPTIMIZELY_GRAPH_SINGLE_KEY }}
  OPTIMIZELY_CMS_URL: ${{ secrets.OPTIMIZELY_CMS_URL }}
  OPTIMIZELY_GRAPH_GATEWAY: ${{ secrets.OPTIMIZELY_GRAPH_GATEWAY }}
# Temporary change
on: workflow_dispatch
# on:
#   push:
#     branches-ignore:
#       - main
jobs:
  Deploy-Preview:
    runs-on: ubuntu-latest
    environment:
      name: Vercel preview environment
      url: ${{steps.vercel-deployment.outputs.site_url}}
    steps:
      - uses: actions/checkout@v2
        with:
          persist-credentials: false

      - name: Setup .npmrc file
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://npm.pkg.github.com'
          # Defaults to the user or organization that owns the workflow file
          scope: '@episerver'

      - uses: pnpm/action-setup@v2
        name: Install pnpm
        id: pnpm-install
      - name: Install Vercel CLI
        run: pnpm install --global vercel@latest
      - name: Install dependencies
        run: pnpm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build packages
        run: pnpm build
      - name: Pull Vercel Environment Information
        working-directory: ./templates/stride
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build Project Artifacts
        working-directory: ./templates/stride
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy Project Artifacts to Vercel
        id: vercel-deployment
        working-directory: ./templates/stride
        run: |
          echo "site_url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})" >> $GITHUB_OUTPUT
