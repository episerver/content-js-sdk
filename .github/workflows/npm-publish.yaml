name: Release Packages

# Triggers automatically whenever code is pushed or merged to the main branch
# Only runs when packages or changesets are modified
on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - '.changeset/**'
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

# Prevents multiple release workflows from running simultaneously
concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to push version bumps and tags
      pull-requests: write  # Needed for Changesets Bot to open the Version PR
      packages: write       # Needed to publish pre-releases to GitHub Packages
      id-token: write       # CRITICAL: Needed for NPM Provenance security signing

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Required to trigger other actions when the bot pushes commits
          fetch-depth: 0
          # Prevent token from persisting in .git/config (security best practice)
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          # The bash script will handle the specific registry routing via .npmrc

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Dependencies
        run: pnpm install

      - name: Build Packages
        run: pnpm --filter "./packages/**" build

      # ==========================================
      # CHANGESETS AUTOMATION & PUBLISHING
      # ==========================================
      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          # Command to bump versions and update changelogs
          version: pnpm changeset version
          
          # Command to execute the custom deployment script
          publish: bash ./scripts/publish.sh
          
          # Git commit message for the bot
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          # Both tokens must be provided so the bash script can authenticate dynamically
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}